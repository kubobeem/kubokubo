<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Hi!</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
        
        .idiot-container { 
            position: fixed; 
            top: 0; bottom: 0; 
            width: 100%; height: 100%; 
        }
        .idiot-container video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            filter: brightness(0.8);
        }
        
        .popup-ui {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            border: 2px solid rgba(255,100,0,0.6);
            font-size: 1.2em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            animation: popupSlideIn 0.5s ease-out;
        }
        
        @keyframes popupSlideIn {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="idiot-container">
    <video src="https://raw.githubusercontent.com/TheGeekBoiz/TheGeekBoiz.github.io/main/PythonScratcher/youareanidiot/media/youare.mp4" 
           muted autoplay loop playsinline></video>
</div>

<div class="popup-ui">
    🎉 HI! YOU GOT PRANKED! 🎉
</div>

<audio id="youare-audio" autoplay loop hidden>
    <source src="https://raw.githubusercontent.com/TheGeekBoiz/TheGeekBoiz.github.io/main/PythonScratcher/youareanidiot/media/youare.mp3" type="audio/mpeg">
</audio>

<script>
// ---------- JavaScript ----------
let clickCount = 0;

// クリックエフェクト追加
document.addEventListener('click', function(e) {
    clickCount++;
    createEmojiEffect(e.clientX, e.clientY);
});

function createEmojiEffect(x, y) {
    const emoji = document.createElement('div');
    const emojis = ['💥', '🤣', '😂', '🎉', '🎊', '⚡', '💫'];
    emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    emoji.style.cssText = `
        position: fixed;
        left: ${x}px;
        top: ${y}px;
        font-size: 30px;
        pointer-events: none;
        z-index: 1001;
        animation: emojiPop 0.8s ease-out forwards;
    `;
    document.body.appendChild(emoji);
    setTimeout(() => emoji.remove(), 800);
}

// CSS アニメーション
const style = document.createElement('style');
style.textContent = `
    @keyframes emojiPop {
        0% {
            opacity: 1;
            transform: translate(0, 0) scale(1);
        }
        100% {
            opacity: 0;
            transform: translate(${Math.random() * 200 - 100}px, -100px) scale(0.2) rotate(360deg);
        }
    }
`;
document.head.appendChild(style);

window.onload = function () {
    const banner = document.querySelector('.popup-ui');
    setInterval(function() {
        banner.style.opacity = banner.style.opacity === '0.7' ? '1' : '0.7';
    }, 400);
};
// ---------- ここまで ----------
</script>
</body>
</html>
