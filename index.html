<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>You are an Idiot!</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
        
        .idiot-container { 
            position: fixed; 
            top: 0; bottom: 0; 
            width: 100%; height: 100%; 
        }
        .idiot-container video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            filter: brightness(0.7);
        }
        
        .info-container { 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            color: white;
            text-align: center;
            animation: bounce 0.8s ease-in-out infinite;
        }
        
        .info-container h1 {
            font-size: 4em;
            margin: 0;
            padding: 20px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9), 0 0 20px rgba(255,0,0,0.5);
            letter-spacing: 2px;
            font-weight: bold;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        .info-container p {
            font-size: 1.2em;
            margin: 10px 0 0 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            opacity: 0.9;
        }
        
        .speaker { 
            cursor: pointer; 
            width: 80px; 
            height: 80px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 10px rgba(255,0,0,0.5));
            transition: transform 0.2s;
        }
        
        .speaker:hover {
            transform: scale(1.1) rotate(5deg);
        }
        
        .speaker:active {
            transform: scale(0.95);
        }
        
        @keyframes bounce {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -55%) scale(1.02); }
        }
        
        @keyframes pulse {
            0%, 100% { text-shadow: 3px 3px 6px rgba(0,0,0,0.9), 0 0 20px rgba(255,0,0,0.5); }
            50% { text-shadow: 3px 3px 6px rgba(0,0,0,0.9), 0 0 40px rgba(255,0,0,0.8); }
        }
        
        .top-left-ui {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 15;
            background: rgba(0,0,0,0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid rgba(255,0,0,0.5);
            color: white;
            font-size: 0.9em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .playfield {
            position: fixed;
            inset: 0;
            z-index: 8;
            pointer-events: none;
        }

        .mini-window {
            position: absolute;
            width: 170px;
            height: 110px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.55);
            box-shadow: 0 12px 30px rgba(0,0,0,0.45);
            background: linear-gradient(145deg, rgba(255,90,90,0.92), rgba(50,0,0,0.88));
            pointer-events: auto;
            animation: popIn 180ms ease-out;
        }

        .mini-window-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 28px;
            padding: 0 8px;
            color: #fff;
            font-weight: 700;
            font-size: 12px;
            background: rgba(0,0,0,0.35);
        }

        .mini-window-close {
            width: 22px;
            height: 22px;
            border: 0;
            border-radius: 6px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .mini-window-close:hover {
            background: rgba(255,255,255,0.35);
        }

        .mini-window-body {
            display: grid;
            place-items: center;
            height: calc(100% - 28px);
            color: #fff;
            font-size: 20px;
            font-weight: 800;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.82);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

<div class="idiot-container">
    <video src="https://raw.githubusercontent.com/TheGeekBoiz/TheGeekBoiz.github.io/main/PythonScratcher/youareanidiot/media/youare.mp4" 
           muted autoplay loop playsinline></video>
</div>

<div class="top-left-ui">
    <div>🎮 YOU ARE AN IDIOT SIMULATOR</div>
    <div id="popup-count">Windows: 0</div>
    <div id="split-count">Splits: 0</div>
</div>

<div id="playfield" class="playfield"></div>

<div class="info-container">
    <img id="youare-micon" class="speaker" 
         src="https://raw.githubusercontent.com/TheGeekBoiz/TheGeekBoiz.github.io/main/PythonScratcher/youareanidiot/media/images/speakerm.png" 
         onclick="musicPlay()"
         title="🔊 Click to play music!">
    
    <h1>YOU ARE AN IDIOT!</h1>
    <p>🎵 Click speaker or anywhere to start music 🎵</p>
</div>

<audio id="youare-audio" loop>
    <source src="https://raw.githubusercontent.com/TheGeekBoiz/TheGeekBoiz.github.io/main/PythonScratcher/youareanidiot/media/youare.mp3" type="audio/mpeg">
</audio>

<script>
// ---------- JavaScript ----------
let audio = document.getElementById('youare-audio');
let micon = document.getElementById('youare-micon');
const playfield = document.getElementById('playfield');
const popupCountEl = document.getElementById('popup-count');
const splitCountEl = document.getElementById('split-count');

let windowCount = 0;
let splitCount = 0;
const splitFactor = 3;
const maxWindows = 180;

function musicPlay() {
    if (audio.paused) {
        audio.play();
        micon.src = "https://raw.githubusercontent.com/TheGeekBoiz/TheGeekBoiz.github.io/main/PythonScratcher/youareanidiot/media/images/speaker.png";
    } else {
        audio.pause();
        micon.src = "https://raw.githubusercontent.com/TheGeekBoiz/TheGeekBoiz.github.io/main/PythonScratcher/youareanidiot/media/images/speakerm.png";
    }
}

// クリックエフェクト
document.addEventListener('click', function(e) {
    musicPlay();
    createParticle(e.clientX, e.clientY);
});

function createParticle(x, y) {
    const particle = document.createElement('div');
    particle.style.cssText = `
        position: fixed;
        left: ${x}px;
        top: ${y}px;
        pointer-events: none;
        z-index: 1000;
        font-size: 20px;
        font-weight: bold;
        animation: particleFloat 1s ease-out forwards;
    `;
    particle.textContent = ['😈', '🤡', '💀', '🎭', '⚡'][Math.floor(Math.random() * 5)];
    document.body.appendChild(particle);
    
    setTimeout(() => particle.remove(), 1000);
}

// CSS アニメーション追加
const style = document.createElement('style');
style.textContent = `
    @keyframes particleFloat {
        0% {
            opacity: 1;
            transform: translate(0, 0) scale(1);
        }
        100% {
            opacity: 0;
            transform: translate(${Math.random() * 100 - 50}px, -50px) scale(0);
        }
    }
`;
document.head.appendChild(style);

function updateStats() {
    popupCountEl.textContent = `Windows: ${windowCount}`;
    splitCountEl.textContent = `Splits: ${splitCount}`;
}

function randomPos(max, size) {
    return Math.max(0, Math.floor(Math.random() * Math.max(1, max - size)));
}

function createMiniWindow(x, y) {
    if (windowCount >= maxWindows) {
        return;
    }

    const node = document.createElement('div');
    node.className = 'mini-window';
    node.style.left = `${x}px`;
    node.style.top = `${y}px`;

    node.innerHTML = `
        <div class="mini-window-header">
            <span>ALERT</span>
            <button class="mini-window-close" aria-label="close">×</button>
        </div>
        <div class="mini-window-body">UwU</div>
    `;

    const closeButton = node.querySelector('.mini-window-close');
    closeButton.addEventListener('click', function(event) {
        event.stopPropagation();
        const rect = node.getBoundingClientRect();
        node.remove();
        windowCount = Math.max(0, windowCount - 1);
        splitCount += 1;

        for (let i = 0; i < splitFactor; i++) {
            const spawnX = Math.max(0, Math.min(window.innerWidth - 170, Math.floor(rect.left + (Math.random() * 240 - 120))));
            const spawnY = Math.max(0, Math.min(window.innerHeight - 110, Math.floor(rect.top + (Math.random() * 180 - 90))));
            createMiniWindow(spawnX, spawnY);
        }

        createParticle(rect.left + rect.width / 2, rect.top + rect.height / 2);
        updateStats();
    });

    playfield.appendChild(node);
    windowCount += 1;
    updateStats();
}

function seedWindows(count) {
    for (let i = 0; i < count; i++) {
        createMiniWindow(randomPos(window.innerWidth, 170), randomPos(window.innerHeight, 110));
    }
}

window.onload = function () {
    seedWindows(6);
};
// ---------- ここまで ----------
</script>
</body>
</html>
